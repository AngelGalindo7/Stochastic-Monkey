name: CI

on:
  push:
    branches: [main]
    paths:
      - 'heuristic-monkey/**'
  pull_request:
    paths:
      - 'heuristic-monkey/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: heuristic-monkey
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: heuristic-monkey/package-lock.json

      - name: Install (skip Chromium download)
        run: npm install --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Run unit tests
        run: npm test
