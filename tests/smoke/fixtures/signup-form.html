<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Create account</title></head>
<body>
  <h1>Create account</h1>
  <form id="signup">
    <label>Email <input type="email" name="email" required></label>
    <label>Password <input type="password" name="password" required minlength="8"></label>
    <label>Confirm password <input type="password" name="confirmPassword" required></label>
    <label>Full name <input type="text" name="fullName" required></label>
    <label>Country
      <select name="country" required>
        <option value="">Select one</option>
        <option value="us">United States</option>
        <option value="ca">Canada</option>
      </select>
    </label>
    <label>Age <input type="number" name="age" min="18" max="120"></label>
    <label><input type="checkbox" name="tos" required> I agree to the terms</label>
    <button type="submit">Sign up</button>
  </form>
  <script>
    document.getElementById('signup').addEventListener('submit', function (e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      var obj = {};
      fd.forEach(function (v, k) { obj[k] = v; });
      obj.__tosChecked = e.target.tos.checked;
      window.__submitted = obj;
    });
  </script>
</body>
</html>
